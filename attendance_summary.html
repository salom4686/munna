<!DOCTYPE html>
<html lang="en">
<head>
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance & Salary</title>
  
  <!-- Favicon/Logo in Tab Bar -->
  <link rel="icon" type="image/png" href="Logo.png">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Flatpickr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">

  
  <style>
    :root {
      --brand-blue: #1d3a6d; 
      --header-text: #ffffff;
      --bg-light: #f4f6f9;
      --accent-yellow: #fff9e6;
      --btn-reset: #dc3545;
      --highlight-green: #e6fffa;
    }

    body {
      background-color: var(--bg-light);
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .main-card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      margin: 0 auto;
      border: 1px solid #e0e0e0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 94vh;
    }

    .page-header {
      background-color: #ffffff;
      padding: 10px 20px;
      border-bottom: 4px solid var(--brand-blue);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .brand-title h2 { color: var(--brand-blue); font-weight: 800; margin: 0; font-size: 1.3rem; }

    .filter-section {
      padding: 12px;
      background: #f8f9fc;
      border-bottom: 1px solid #eee;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      align-items: end;
      flex-shrink: 0;
    }

    .filter-group label { font-size: 10px; font-weight: 700; color: var(--brand-blue); margin-bottom: 3px; display: block; text-transform: uppercase; }

    .custom-date-input { background-color: #ffffff !important; cursor: pointer !important; font-weight: 600; font-size: 12px; }

    .btn-action { font-size: 11px; padding: 5px 12px; font-weight: 600; }
    .btn-reset { background-color: var(--btn-reset); color: white; border: none; }

    .summary-bar {
      padding: 8px 20px;
      background: #eef2f7;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 20px;
      font-weight: bold;
      color: var(--brand-blue);
      font-size: 13px;
    }

    .table-responsive { overflow: auto; flex-grow: 1; position: relative; }

    .attendance-table { width: 100%; border-collapse: separate; border-spacing: 0; }

    .attendance-table thead th {
      background-color: var(--brand-blue) !important;
      color: var(--header-text) !important;
      padding: 8px 6px;
      text-align: center;
      font-size: 9px;
      position: sticky;
      top: 0;
      z-index: 20;
      border: 1px solid #142a50;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .attendance-table tbody td {
      padding: 6px 4px;
      text-align: center;
      font-size: 11px;
      border: 1px solid #e0e0e0;
      white-space: nowrap;
    }

    .total-attendance-col { background-color: var(--accent-yellow); font-weight: 700; color: var(--brand-blue); }
    .highlight-col { background-color: var(--highlight-green); font-weight: 700; color: #0d685b; }
    .deduction-col { background-color: #fff1f1; color: #a94442; }
    .grand-total-row { background-color: #f1f3f5; font-weight: 800; color: #000; position: sticky; bottom: 0; z-index: 5; }

    #typeValueGroup { display: none; }
    .align-left { text-align: left !important; padding-left: 8px !important; }
    #loader { padding: 40px; text-align: center; color: var(--brand-blue); }

    .search-input-group { display: flex; }
    .search-input-group select { border-top-right-radius: 0; border-bottom-right-radius: 0; width: 100px; font-size: 11px; }
    .search-input-group input { border-top-left-radius: 0; border-bottom-left-radius: 0; font-size: 11px; }

    @media print {
      .filter-section, .btn-action, .summary-bar, .no-print, #loader, .page-header { display: none !important; }
      body { padding: 0; background-color: white; }
      .main-card { border: none; box-shadow: none; max-height: none; overflow: visible; }
    }
  </style>
</head>
<body id="bodyRoot">

<div class="container-fluid">
  <div class="main-card">
    <div class="page-header">
      <div class="brand-title">
        <h2>ALAMHOW CO LTD</h2>
        <span style="font-size: 0.8rem; color: #666;">Monthly Attendance & Salary Summary</span>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-action btn-outline-secondary" onclick="openPreview()">Preview Report</button>
        <button class="btn btn-action btn-primary" onclick="refreshData()">Refresh Data</button>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-group" style="grid-column: span 2;">
        <label>Search Information:</label>
        <div class="search-input-group">
          <select id="searchType" class="form-select form-select-sm" onchange="processData()">
            <option value="ALL">ALL</option>
            <option value="EMPLOYEE ID">ID</option>
            <option value="EMPLOYEE NAME">NAME</option>
            <option value="PASSPORT NO">PASSPORT</option>
          </select>
          <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Type here..." onkeyup="processData()">
        </div>
      </div>
      <div class="filter-group">
        <label>Start Date:</label>
        <input type="text" id="startDate" class="form-control form-control-sm custom-date-input" placeholder="Start Date">
      </div>
      <div class="filter-group">
        <label>End Date:</label>
        <input type="text" id="endDate" class="form-control form-control-sm custom-date-input" placeholder="End Date">
      </div>
      <div class="filter-group">
        <label>Employee:</label>
        <select id="empFilter" class="form-select form-select-sm" onchange="processData()"></select>
      </div>
      <div class="filter-group">
        <label>Side Name:</label>
        <select id="sideFilter" class="form-select form-select-sm" onchange="processData()"></select>
      </div>
      <div class="filter-group">
        <label>Filter Type:</label>
        <select id="columnSelector" class="form-select form-select-sm" onchange="handleTypeChange()">
          <option value="">-- Select Type --</option>
          <option value="STATUS">STATUS</option>
          <option value="HOLIDAY">HOLIDAY</option>
          <option value="SUNDAY WORK">SUNDAY WORK</option>
        </select>
      </div>
      <div class="filter-group" id="typeValueGroup">
        <label id="typeValueLabel">Value:</label>
        <select id="typeValueSelect" class="form-select form-select-sm" onchange="processData()"></select>
      </div>
      <div class="filter-group">
        <button class="btn btn-sm btn-reset btn-action w-100" onclick="resetFilters()">Clear</button>
      </div>
    </div>

    <div class="summary-bar" id="summaryBar">
      <span>Employees: <span id="statEmp">0</span></span>
      <span>Present: <span id="statPresent">0</span></span>
    </div>

    <div id="loader">
      <div class="spinner-border spinner-border-sm" role="status"></div>
    </div>

    <div class="table-responsive">
      <table class="table attendance-table" id="attendanceTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
        <tfoot id="tableFoot"></tfoot>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxUTUqS8NS7nARLXSr_tbkoBnsmcxeGnOCSSmL4d1ZHxvg4PwlYiFpwMxGoy9XwJRuF1g/exec";
  let rawData = [];
  let colIndexMap = {}; 
  const DAYS_IN_MONTH = 30;
  let startPicker, endPicker;

  const displayHeaders = [
    "ISSUE DATE", "SL NO", "ATTENDANCE DATE", "EMPLOYEE ID", "EMPLOYEE NAME", 
    "DESIGNATION", "JOINING DATE", "PASSPORT NO", "BASIC SALARY", "TOTAL OT HOURS", 
    "OT RATE", "OT AMOUNT", "GROS SALARY", "NEED SALARY", "STATUS", "HOLIDAY", "SIDE NAME"
  ];

  window.onload = function() { 
    initCustomDatePickers();
    loadDataFromAPI(); 
  };

  function initCustomDatePickers() {
    const config = { dateFormat: "Y-m-d", altInput: true, altFormat: "d-m-Y", onChange: () => processData() };
    startPicker = flatpickr("#startDate", config);
    endPicker = flatpickr("#endDate", config);
  }

  async function loadDataFromAPI() {
    try {
      const response = await fetch(WEB_APP_URL);
      const data = await response.json();
      if (!data || data.length === 0) return;
      rawData = data;
      mapSheetColumns(data[0]); 
      populateStaticFilters(data);
      document.getElementById('loader').style.display = 'none';
      processData();
    } catch (error) { console.error(error); }
  }

  function mapSheetColumns(headers) {
    headers.forEach((h, i) => { colIndexMap[h.toString().trim().toUpperCase()] = i; });
  }

  function processData() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const searchType = document.getElementById("searchType").value;
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;
    const fEmp = document.getElementById("empFilter").value;
    const fSide = document.getElementById("sideFilter").value;
    const fType = document.getElementById("columnSelector").value;
    const fTypeVal = document.getElementById("typeValueSelect").value.toLowerCase();

    const dIdx = colIndexMap["ATTENDANCE DATE"] || colIndexMap["ISSUE DATE"];
    const eIdx = colIndexMap["EMPLOYEE ID"];
    const sIdx = colIndexMap["SIDE NAME"];

    const filteredRows = rawData.slice(1).filter(row => {
      const rId = row[eIdx]?.toString().toUpperCase() || "";
      const rSide = row[sIdx]?.toString().toUpperCase() || "";
      const rDate = parseDate(row[dIdx]);
      
      let match = true;
      if (search) {
        if (searchType === "ALL") match = row.join(" ").toLowerCase().includes(search);
        else match = (row[colIndexMap[searchType]] || "").toString().toLowerCase().includes(search);
      }
      if (match && start && rDate < new Date(start + "T00:00:00")) match = false;
      if (match && end && rDate > new Date(end + "T23:59:59")) match = false;
      if (match && fEmp && rId !== fEmp) match = false;
      if (match && fSide && rSide !== fSide) match = false;
      if (match && fType && fTypeVal) {
        const actualVal = (row[colIndexMap[fType]] || "").toString().toLowerCase().trim();
        if (actualVal !== fTypeVal) match = false;
      }
      return match;
    });

    const isSummary = (start || end || fEmp || fSide || (fType && fTypeVal));
    if (isSummary) {
      document.getElementById('bodyRoot').classList.add('summary-mode');
      renderSummaryView(filteredRows);
    } else {
      document.getElementById('bodyRoot').classList.remove('summary-mode');
      renderDetailedView(filteredRows);
    }
    updateStats();
  }

  function renderDetailedView(rows) {
    const thead = document.getElementById('tableHead');
    const tbody = document.getElementById('tableBody');
    document.getElementById('tableFoot').innerHTML = "";
    thead.innerHTML = '<tr><th>SL</th>' + displayHeaders.map(h => `<th class="${["EMPLOYEE NAME", "SIDE NAME"].includes(h) ? 'align-left' : ''}">${h}</th>`).join('') + '</tr>';
    tbody.innerHTML = rows.map((row, idx) => `<tr><td>${idx+1}</td>` + displayHeaders.map(h => `<td>${(colIndexMap[h] !== undefined && row[colIndexMap[h]] !== "") ? row[colIndexMap[h]] : "-"}</td>`).join('') + '</tr>').join('');
  }

  function renderSummaryView(rows) {
    const thead = document.getElementById('tableHead');
    const tbody = document.getElementById('tableBody');
    const tfoot = document.getElementById('tableFoot');
    const summary = {};
    rows.forEach(row => {
      const id = row[colIndexMap["EMPLOYEE ID"]];
      if (!id) return;
      if (!summary[id]) {
        summary[id] = { id, name: row[colIndexMap["EMPLOYEE NAME"]], des: row[colIndexMap["DESIGNATION"]], mBasic: parseFloat(row[colIndexMap["BASIC SALARY"]]) || 0, att: 0, otHrs: 0, otRate: parseFloat(row[colIndexMap["OT RATE (PER HOUR)"]]) || 0, hol: 0, sun: 0, ab: 0, pb: 0, adv: 0 };
      }
      const st = (row[colIndexMap["STATUS"]] || "").toString().toUpperCase();
      if (st.startsWith('P') || st === "" || st === "PRESENT") summary[id].att++;
      summary[id].otHrs += parseFloat(row[colIndexMap["TOTAL OT HOURS"]]) || 0;
      summary[id].hol += parseFloat(row[colIndexMap["HOLIDAY"]]) || 0;
      summary[id].sun += parseFloat(row[colIndexMap["SUNDAY WORK"]]) || 0;
      summary[id].ab += parseFloat(row[colIndexMap["ATTENDANCE BONUS"]]) || 0;
      summary[id].pb += parseFloat(row[colIndexMap["PERFORMANCE BONUS"]]) || 0;
      summary[id].adv += parseFloat(row[colIndexMap["ADVANCE"]]) || 0;
    });

    thead.innerHTML = `<tr><th rowspan="2">SL</th><th rowspan="2">ID</th><th rowspan="2" class="align-left">NAME</th><th rowspan="2" class="align-left">DESIGNATION</th><th rowspan="2">M.BASIC</th><th rowspan="2" class="total-attendance-col">ATT</th><th rowspan="2">ACT.BASIC</th><th rowspan="2">OT HRS</th><th rowspan="2">OT AMT</th><th colspan="3" class="deduction-col">DEDUCTION</th><th rowspan="2" class="highlight-col">NEED SALARY</th><th rowspan="2">SIGNATURE</th></tr><tr><th class="deduction-col">ADV</th><th class="deduction-col">NPS</th><th class="deduction-col">CSG</th></tr>`;
    
    let g_mBasic=0, g_att=0, g_actBasic=0, g_otHrs=0, g_otAmt=0, g_adv=0, g_nps=0, g_csg=0, g_need=0;
    tbody.innerHTML = Object.values(summary).sort((a,b) => a.id.toString().localeCompare(b.id.toString(), undefined, {numeric:true})).map((emp, i) => {
      const actB = (emp.mBasic / DAYS_IN_MONTH) * emp.att;
      const otA = emp.otHrs * emp.otRate;
      const totalPlus = actB + otA + emp.hol + emp.sun + emp.ab + emp.pb;
      const nps = totalPlus * 0.01;
      const csg = totalPlus * 0.015;
      const need = totalPlus - (emp.adv + nps + csg);
      g_mBasic+=emp.mBasic; g_att+=emp.att; g_actBasic+=actB; g_otHrs+=emp.otHrs; g_otAmt+=otA; g_adv+=emp.adv; g_nps+=nps; g_csg+=csg; g_need+=need;
      return `<tr><td>${i+1}</td><td>${emp.id}</td><td class="align-left">${emp.name}</td><td class="align-left">${emp.des}</td><td>${emp.mBasic.toFixed(2)}</td><td class="total-attendance-col">${emp.att}</td><td>${actB.toFixed(2)}</td><td>${emp.otHrs.toFixed(2)}</td><td>${otA.toFixed(2)}</td><td class="deduction-col">${emp.adv.toFixed(2)}</td><td class="deduction-col">${nps.toFixed(2)}</td><td class="deduction-col">${csg.toFixed(2)}</td><td class="highlight-col">${need.toFixed(2)}</td><td></td></tr>`;
    }).join('');
    
    tfoot.innerHTML = `<tr class="grand-total-row"><td colspan="4" class="text-end">GRAND TOTAL:</td><td>${g_mBasic.toFixed(2)}</td><td class="total-attendance-col">${g_att}</td><td>${g_actBasic.toFixed(2)}</td><td>${g_otHrs.toFixed(2)}</td><td>${g_otAmt.toFixed(2)}</td><td class="deduction-col">${g_adv.toFixed(2)}</td><td class="deduction-col">${g_nps.toFixed(2)}</td><td class="deduction-col">${g_csg.toFixed(2)}</td><td class="highlight-col">${g_need.toFixed(2)}</td><td></td></tr>`;
  }

  function handleTypeChange() {
    const sel = document.getElementById("columnSelector"), valG = document.getElementById("typeValueGroup"), valS = document.getElementById("typeValueSelect");
    if (sel.value !== "") {
      valG.style.display = "block";
      const vals = [...new Set(rawData.slice(1).map(r => (r[colIndexMap[sel.value]] || "").toString().trim()))].filter(v => v && v !== "-");
      valS.innerHTML = '<option value="">-- All --</option>' + vals.sort().map(v => `<option value="${v}">${v}</option>`).join('');
      document.getElementById("typeValueLabel").innerText = sel.options[sel.selectedIndex].text + ":";
    } else valG.style.display = "none";
    processData();
  }

  function updateStats() {
    const tbody = document.getElementById('tableBody'), isSum = document.getElementById('bodyRoot').classList.contains('summary-mode');
    let ids = new Set(), pres = 0;
    for (let r of tbody.rows) {
      if (r.cells[1]?.innerText !== '-') ids.add(r.cells[1]?.innerText);
      pres += isSum ? (parseInt(r.cells[5]?.innerText) || 0) : 1;
    }
    document.getElementById("statEmp").innerText = ids.size;
    document.getElementById("statPresent").innerText = pres;
  }

  function populateStaticFilters(data) {
    const eSel = document.getElementById('empFilter'), sSel = document.getElementById('sideFilter');
    const emps = new Map(), sides = new Set();
    data.slice(1).forEach(r => {
      if(r[colIndexMap["EMPLOYEE ID"]]) emps.set(r[colIndexMap["EMPLOYEE ID"]].toString().toUpperCase(), r[colIndexMap["EMPLOYEE NAME"]]);
      if(r[colIndexMap["SIDE NAME"]]) sides.add(r[colIndexMap["SIDE NAME"]].toString().toUpperCase());
    });
    eSel.innerHTML = '<option value="">All Employees</option>' + [...emps.entries()].sort((a,b)=>a[0].localeCompare(b[0],undefined,{numeric:true})).map(([id,name])=>`<option value="${id}">${id} | ${name}</option>`).join('');
    sSel.innerHTML = '<option value="">All Sides</option>' + [...sides].sort().map(s=>`<option value="${s}">${s}</option>`).join('');
  }

  function parseDate(s) { if (!s) return new Date(0); const p = s.toString().split(/[-/]/); return p.length === 3 ? new Date(p[2], p[1]-1, p[0]) : new Date(s); }
  function refreshData() { resetFilters(); document.getElementById('loader').style.display='block'; loadDataFromAPI(); }
  function resetFilters() { document.getElementById("searchInput").value=""; if(startPicker) startPicker.clear(); if(endPicker) endPicker.clear(); document.getElementById("empFilter").value=""; document.getElementById("sideFilter").value=""; document.getElementById("columnSelector").value=""; document.getElementById("typeValueGroup").style.display="none"; processData(); }

  function openPreview() {
    const tableHeader = document.getElementById('tableHead').innerHTML;
    const tableBody = document.getElementById('tableBody').innerHTML;
    const tableFooter = document.getElementById('tableFoot').innerHTML;
    const startInput = document.getElementById('startDate').value;
    const monthYear = startInput ? new Date(startInput).toLocaleString('en-us', {month:'long', year:'numeric'}) : "Full Report";

    const previewWindow = window.open('', '_blank');
    previewWindow.document.write(`
      <html>
        <head>
          <title>ALAMHOW - Salary Sheet Preview</title>
          <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
          <style>
            @page { size: landscape; margin: 10mm 5mm; }
            
            body { 
              font-family: 'Segoe UI', sans-serif; 
              margin: 0; 
              padding: 40px 0; 
              background: #f0f2f5; 
              display: flex; 
              justify-content: center; /* Center horizontally */
              min-height: 100vh;
            }
            
            .print-container { 
              background: #fff; 
              width: 95%; 
              max-width: 1300px; 
              padding: 40px; 
              box-shadow: 0 4px 20px rgba(0,0,0,0.15); 
              border-radius: 12px; 
              margin: 0 auto; /* Center alignment */
              display: flex;
              flex-direction: column;
            }

            .report-header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid #1d3a6d; padding-bottom: 15px; }
            .report-header h2 { color: #1d3a6d; margin: 0; font-weight: 800; font-size: 28px; }
            .report-header p { margin: 8px 0 0; font-size: 18px; color: #555; font-weight: 500; }
            
            table { width: 100%; border-collapse: collapse; font-size: 10.5px !important; border: 1.5px solid #000 !important; }
            th { background-color: #f1f3f5 !important; border: 1px solid #000 !important; padding: 8px 4px !important; text-align: center; font-weight: bold; color: #1d3a6d; text-transform: uppercase; }
            td { border: 1px solid #000 !important; padding: 6px 4px !important; text-align: center; vertical-align: middle; }
            .align-left { text-align: left !important; padding-left: 10px !important; }

            .grand-total-row { 
              background-color: #e9ecef !important; 
              font-weight: 900; 
              color: #000;
              border-top: 2px solid #000 !important;
            }

            .signature-container { 
              display: flex; 
              justify-content: space-between; 
              width: 100%; 
              margin-top: 60px; 
              padding-top: 10px;
              page-break-inside: avoid;
            }
            .sig-box { text-align: center; width: 22%; border-top: 1.5px solid #000; padding-top: 8px; font-size: 13px; font-weight: bold; color: #222; }

            .no-print-btn { 
              position: fixed; 
              top: 20px; 
              right: 40px; 
              padding: 12px 30px; 
              background: #1d3a6d; 
              color: white; 
              border: none; 
              font-weight: bold; 
              border-radius: 8px; 
              cursor: pointer; 
              z-index: 1000; 
              box-shadow: 0 4px 15px rgba(0,0,0,0.3);
              transition: transform 0.2s;
            }
            .no-print-btn:hover { transform: scale(1.05); background: #142a50; }

            @media print {
              body { background: #fff; padding: 0; display: block; }
              .print-container { box-shadow: none; width: 100%; max-width: none; padding: 5mm; border-radius: 0; margin: 0; }
              .no-print-btn { display: none; }
              thead { display: table-header-group; }
              tfoot { display: table-row-group; }
            }
          </style>
        </head>
        <body>
          <button class="no-print-btn" onclick="window.print()">PRINT / SAVE AS PDF</button>
          <div class="print-container">
            <div class="report-header">
              <h2>ALAMHOW CO LTD</h2>
              <p>Monthly Salary Summary - ${monthYear}</p>
            </div>
            <table>
              <thead>${tableHeader}</thead>
              <tbody>${tableBody}</tbody>
              <tfoot><tr class="grand-total-row">${tableFooter}</tr></tfoot>
            </table>
            
            <div class="signature-container">
              <div class="sig-box">PREPARED BY</div>
              <div class="sig-box">CHECKED BY</div>
              <div class="sig-box">AUTHORIZED BY</div>
              <div class="sig-box">APPROVED BY</div>
            </div>
          </div>
        </body>
      </html>
    `);
    previewWindow.document.close();
  }
</script>
</body>
</html>
