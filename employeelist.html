
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee List</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/u/0/d/11bxOPboUUmQxIkT6gMYWYqxfh9jZSiLo">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; margin: 0; padding: 20px 0; background-color: #f4f6f9; color: #333; }
        
        /* সার্চ ও বাটন সেকশন (এখন এটিই মেইন হেডার হিসেবে কাজ করবে) */
        .search-container { 
            max-width: 1600px; 
            margin: 0 auto 20px; 
            padding: 0 30px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            flex-wrap: wrap; 
            gap: 20px; 
        }

        /* বাম পাশের লোগো ও টাইটেল সেকশন */
        .brand-section {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        .logo-img { height: 80px; width: auto; }
        .list-title {
            font-size: 22px;
            font-weight: 700;
            color: #002147;
            text-transform: uppercase;
            border-bottom: 3px solid #FFD700;
            margin: 0;
            padding-bottom: 5px;
            white-space: nowrap;
        }

        /* ডান পাশের বাটন ও সার্চ বক্স সেকশন */
        .action-section {
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: flex-end;
            flex: 1;
        }

        .add-btn { background-color: #002147; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; white-space: nowrap; }
        .add-btn:hover { background-color: #28a745; }
        .search-box { width: 300px; padding: 10px 15px; border: 2px solid #002147; border-radius: 8px; outline: none; }

        /* টেবিল কার্ড */
        .container { padding: 0 30px 40px; max-width: 1600px; margin: auto; }
        .table-card { background: white; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.08); overflow: auto; max-height: 75vh; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        thead th { position: sticky; top: 0; background-color: #002147; color: white; padding: 16px; text-align: left; z-index: 10; border-bottom: 2px solid #FFD700; }
        td { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; font-size: 14px; white-space: nowrap; }
        tr:hover { background-color: #f8fbff; }

        /* মোডাল স্টাইল */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 2% auto; padding: 30px; border-radius: 15px; width: 550px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .close-modal { position: absolute; right: 25px; top: 20px; font-size: 28px; cursor: pointer; color: #999; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; font-weight: 700; color: #555; margin-bottom: 5px; }
        .required::after { content: " *"; color: red; font-size: 14px; }
        
        .form-group input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: #002147; box-shadow: 0 0 5px rgba(0,33,71,0.1); }
        .form-group input[readonly] { background: #f1f3f5; font-weight: bold; color: #002147; cursor: not-allowed; }
        .full-width { grid-column: span 2; }
        .submit-btn { grid-column: span 2; background: #002147; color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; margin-top: 10px; transition: 0.3s; }
        .submit-btn:hover { background: #1b4d3e; }
        
        #loader { text-align: center; padding: 100px; font-weight: bold; font-size: 18px; color: #002147; }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="brand-section">
            <img src="https://lh3.googleusercontent.com/u/0/d/11bxOPboUUmQxIkT6gMYWYqxfh9jZSiLo" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/80?text=ALAMHOW'">
            <h2 class="list-title">EMPLOYEE LIST</h2>
        </div>

        <div class="action-section">
            <button class="add-btn" onclick="openModal()">+ ADD NEW EMPLOYEE</button>
            <input type="text" id="searchInput" class="search-box" placeholder="Search ID, Name...">
        </div>
    </div>

    <div id="entryModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">×</span>
            <h3 style="margin:0; color: #002147;">Add Employee Record</h3>
            <p style="font-size: 12px; color: #888; margin-top: 10px;">Fields with <span style="color:red">*</span> are mandatory.</p>
            
            <form id="employeeForm">
                <div class="form-grid">
                    <div class="form-group"><label>SL NO</label><input type="text" id="regSL" readonly></div>
                    <div class="form-group"><label>EMPLOYEE ID</label><input type="text" id="regID" readonly></div>
                    <div class="form-group full-width"><label class="required">EMPLOYEE NAME</label><input type="text" id="regName" required placeholder="Full Name"></div>
                    <div class="form-group">
                        <label class="required">DATE JOINED</label>
                        <input type="text" id="regJoinDate" placeholder="Select Date" required style="background: #fff; cursor: pointer;">
                    </div>
                    <div class="form-group"><label class="required">POST / DESIGNATION</label><input type="text" id="regPost" placeholder="Job Title" required></div>
                    <div class="form-group"><label class="required">WORKING AS</label><input type="text" id="regWorkAs" placeholder="Department" required></div>
                    <div class="form-group"><label class="required">PASSPORT NO</label><input type="text" id="regPassport" placeholder="Passport Number" required></div>
                    <div class="form-group"><label class="required">BASIC SALARY</label><input type="number" id="regSalary" placeholder="0.00" required></div>
                    <div class="form-group"><label class="required">OT RATE (HOUR)</label><input type="number" id="regOT" step="0.01" placeholder="0.00" required></div>
                    <button type="submit" class="submit-btn" id="saveBtn">SAVE TO DATABASE</button>
                </div>
            </form>
        </div>
    </div>

    <div class="container">
        <div id="loader">Please Wait Data Loading...</div>
        <div class="table-card" id="table-display" style="display: none;">
            <table id="employeeTable">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbyo1KzMfWqUwo2mbQV0zQQ8lDCa8_tERtrEdS2WuFWhZnnY5MVQ5dADY_4A8GJWLLwL/exec'; 
        let cachedData = [];

        flatpickr("#regJoinDate", {
            dateFormat: "d/m/Y",
            allowInput: false,
            theme: "material_blue"
        });

        async function loadData() {
            try {
                const response = await fetch(`${scriptUrl}?type=json&sheet=EMPLOYEE%20LIST`);
                const data = await response.json();
                cachedData = data;
                renderTable(data);
            } catch (e) { 
                document.getElementById('loader').innerText = "ডাটা লোড করতে সমস্যা হচ্ছে!"; 
            }
        }

       function renderTable(data) {
    const head = document.getElementById('table-head');
    const body = document.getElementById('table-body');
    const headers = data[0]; 

    // হেডার তৈরি
    head.innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
    
    let rows = "";
    
    // ১ নম্বর ইন্ডেক্স থেকে লুপ শুরু (ডাটা রো)
    for(let i = 1; i < data.length; i++) {
        let row = data[i];

        // চেক করা হচ্ছে B কলাম (index 1) খালি কি না
        // যদি B কলামে কোনো ডাটা না থাকে, তবে সেই রো এবং তার পরের সব বাদ যাবে
        if (!row[1] || row[1].toString().trim() === "") {
            continue; 
        }

        rows += "<tr>";
        row.forEach((cell) => {
            rows += `<td>${cell || '-'}</td>`;
        });
        rows += "</tr>";
    }
    
    body.innerHTML = rows;
    document.getElementById('loader').style.display = 'none';
    document.getElementById('table-display').style.display = 'block';
}function renderTable(data) {
    const head = document.getElementById('table-head');
    const body = document.getElementById('table-body');
    const headers = data[0]; 

    // হেডার তৈরি
    head.innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
    
    let rows = "";
    
    // ১ নম্বর ইন্ডেক্স থেকে লুপ শুরু (ডাটা রো)
    for(let i = 1; i < data.length; i++) {
        let row = data[i];

        // চেক করা হচ্ছে B কলাম (index 1) খালি কি না
        // যদি B কলামে কোনো ডাটা না থাকে, তবে সেই রো এবং তার পরের সব বাদ যাবে
        if (!row[1] || row[1].toString().trim() === "") {
            continue; 
        }

        rows += "<tr>";
        row.forEach((cell) => {
            rows += `<td>${cell || '-'}</td>`;
        });
        rows += "</tr>";
    }
    
    body.innerHTML = rows;
    document.getElementById('loader').style.display = 'none';
    document.getElementById('table-display').style.display = 'block';
}

        function openModal() {
            const nextSL = cachedData.length;
            let nextID = "ACL-0027";
            if (cachedData.length > 1) {
                const lastID = cachedData[cachedData.length-1][1];
                const lastNum = parseInt(lastID.toString().replace(/\D/g, '')) || 1000;
                nextID = "ACL-" + (lastNum + 1).toString().padStart(4, '0');
            }
            document.getElementById('regSL').value = nextSL;
            document.getElementById('regID').value = nextID;
            document.getElementById('entryModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('entryModal').style.display = 'none'; document.getElementById('employeeForm').reset(); }

        document.getElementById('employeeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saving..."; btn.disabled = true;

            const payload = {
                sl: document.getElementById('regSL').value,
                id: document.getElementById('regID').value,
                name: document.getElementById('regName').value,
                dateJoined: document.getElementById('regJoinDate').value,
                post: document.getElementById('regPost').value,
                workingAs: document.getElementById('regWorkAs').value,
                passport: document.getElementById('regPassport').value,
                salary: document.getElementById('regSalary').value,
                otRate: document.getElementById('regOT').value
            };

            try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                alert("Employee Added Successfully!");
                location.reload();
            } catch (err) {
                alert("Success!");
                location.reload();
            }
        });

        document.getElementById('searchInput').addEventListener('keyup', function() {
            const val = this.value.toUpperCase();
            document.querySelectorAll('#table-body tr').forEach(tr => {
                tr.style.display = tr.innerText.toUpperCase().includes(val) ? "" : "none";
            });
        });

        window.onload = loadData;
    </script>
</body>
</html>
