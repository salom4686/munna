<!DOCTYPE html>
<html>
<head>
    <title>Data from Google Sheet</title>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script>
        $(document).ready(function () {
            var sheetID = '<YOUR_SHEET_ID>'; // Replace with your actual Google Sheet ID
            var apiKey = '<YOUR_API_KEY>'; // Replace with your Google API key
            var range = 'Sheet1!A:Z'; // Adjust the range as needed

            $.get(`https://sheets.googleapis.com/v4/spreadsheets/${sheetID}/values/${range}?key=${apiKey}`, function (data) {
                var rows = data.values;
                var html = '<table border="1">';

                if (rows && rows.length > 0) {
                    html += '<tr>';
                    for (var i = 0; i < rows[0].length; i++) {
                        html += '<th>' + rows[0][i] + '</th>';
                    }
                    html += '</tr>';

                    for (var i = 1; i < rows.length; i++) {
                        html += '<tr>';
                        for (var j = 0; j < rows[i].length; j++) {
                            html += '<td>' + rows[i][j] + '</td>';
                        }
                        html += '</tr>';
                    }
                }
                html += '</table>';
                $('#data').html(html);
            });
        });
    </script>
</head>
<body>
    <h1>Data from Google Sheet</h1>
    <div id="data"></div>
</body>
</html>
