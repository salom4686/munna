<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee List</title>
    <script>
        async function fetchEmployeeData() {
            const response = await fetch('https://script.google.com/macros/s/AKfycbyo1KzMfWqUwo2mbQV0zQQ8lDCa8_tERtrEdS2WuFWhZnnY5MVQ5dADY_4A8GJWLLwL/exec');
            const data = await response.json();
            displayData(data);
        }

        function displayData(data) {
            const table = document.getElementById('employee-table');
            data.forEach(employee => {
                const row = table.insertRow();
                const cell1 = row.insertCell(0);
                const cell2 = row.insertCell(1);
                cell1.innerHTML = employee.name;
                cell2.innerHTML = employee.position;
            });
        }

        window.onload = fetchEmployeeData;
    </script>
</head>
<body>
    <h1>Employee List</h1>
    <table id="employee-table" border="1">
        <tr>
            <th>Name</th>
            <th>Position</th>
        </tr>
    </table>
</body>
</html>
