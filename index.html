<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
    
    /* ১. মেইন হেডার স্টিকি (Main Header) */
    .main-header { 
      background-color: #ffffff; 
      padding: 15px; 
      text-align: center; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      position: sticky; /* মেইন হেডার আটকে থাকবে */
      top: 0; 
      z-index: 1000; /* এটি যেন সবার ওপরে থাকে */
    }
    
    h2 { margin: 0; color: #1a73e8; }

    .content-area { padding: 20px; }

    /* কন্টেইনারে স্ক্রলবার সেট করা */
    .table-container { 
      background: white; 
      border-radius: 8px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
      overflow: auto; 
      max-height: 75vh; /* টেবিলের উচ্চতা যাতে স্ক্রিন ছাড়িয়ে না যায় */
      border: 1px solid #ddd;
    }

    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    
    /* ২. টেবিল হেডার স্টিকি (Table Header) */
    thead th { 
      background-color: #4285f4; 
      color: white; 
      padding: 15px 12px;
      text-align: left;
      position: sticky; /* টেবিল হেডার আটকে থাকবে */
      top: 0;           /* টেবিল কন্টেইনারের একদম ওপরে */
      z-index: 100;     /* ডাটা রো এর ওপরে থাকবে */
      box-shadow: 0 2px 2px rgba(0,0,0,0.1);
    }

    td { border-bottom: 1px solid #eee; padding: 12px; font-size: 14px; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    tr:hover { background-color: #f1f4f9; }

  </style>
</head>
<body>

  <div class="main-header">
    <h2>Employee Database Management</h2>
  </div>

  <div class="content-area">
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <? for (var j = 0; j < data[0].length; j++) { ?>
              <th><?= data[0][j] ?></th>
            <? } ?>
          </tr>
        </thead>
        <tbody>
          <? for (var i = 1; i < data.length; i++) { ?>
            <tr>
              <? for (var j = 0; j < data[i].length; j++) { ?>
                <td><?= data[i][j] ?></td>
              <? } ?>
            </tr>
          <? } ?>
        </tbody>
      </table>
    </div>
  </div>

</body>
</html>
