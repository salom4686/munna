<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .welcome-box { margin-bottom: 25px; }
        .welcome-box h2 { color: #1b365d; margin: 0; }
        .welcome-box p { color: #7f8c8d; font-size: 14px; }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .stat-card {
            background: #fff;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border-top: 4px solid #e1b12c;
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }

        .stat-card:hover { transform: translateY(-5px); }
        .stat-card i { font-size: 25px; color: #1b365d; margin-bottom: 12px; }
        .stat-card h4 { font-size: 13px; color: #7f8c8d; margin-bottom: 5px; margin-top:0; }
        .stat-card p { font-size: 18px; font-weight: 700; color: #1b365d; margin: 0; }
    </style>
</head>
<body>
    <div class="welcome-box">
        <h2>Welcome, Admin! 👋</h2>
        <p>Quick access to your HR and Project tools.</p>
    </div>

    <div class="dashboard-grid">
        <a href="employeelist.html" class="stat-card">
            <i class="fa-solid fa-user-group"></i>
            <h4>Employees</h4>
            <p>View List</p>
        </a>
        <a href="newattendance.html" class="stat-card">
            <i class="fa-solid fa-calendar-check"></i>
            <h4>Attendance</h4>
            <p>Mark New</p>
        </a>
        <a href="/attendance_summary_update.html
" class="stat-card">
            <i class="fa-solid fa-chart-line"></i>
            <h4>Reports</h4>
            <p>Summary</p>
        </a>
    </div>
</body>
</html>
